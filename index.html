<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helenny | Photography</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --card: #16161e;
      --border: #222230;
      --accent: #c8a96e;
      --accent2: #e8c98e;
      --text: #f0f0f0;
      --muted: #888;
      --tag-bg: #1e1e2a;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }
    .logo span { color: var(--text); }
    nav { display: flex; gap: 8px; align-items: center; }
    nav button {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    nav button:hover, nav button.active {
      color: var(--text);
      background: var(--border);
    }
    nav button.active { color: var(--accent); }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 80px 24px 48px;
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .hero p {
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ===== SEARCH & FILTERS ===== */
    .controls {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px 0;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px 10px 42px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
    }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ===== ALBUMS ===== */
    .section { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
    .section-title {
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }
    .album-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }
    .album-card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .album-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      overflow: hidden;
    }
    .album-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .album-info { padding: 14px 16px; }
    .album-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .album-count { color: var(--muted); font-size: 0.8rem; }

    /* ===== MASONRY GALLERY ===== */
    .gallery {
      columns: 4;
      column-gap: 12px;
    }
    @media (max-width: 1200px) { .gallery { columns: 3; } }
    @media (max-width: 800px)  { .gallery { columns: 2; } }
    @media (max-width: 500px)  { .gallery { columns: 1; } }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      background: var(--card);
    }
    .photo-item img {
      width: 100%;
      display: block;
      transition: transform 0.3s;
    }
    .photo-item:hover img { transform: scale(1.03); }
    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px;
    }
    .photo-item:hover .photo-overlay { opacity: 1; }
    .photo-title { font-size: 0.85rem; font-weight: 600; color: #fff; }
    .photo-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .photo-tag {
      background: rgba(200,169,110,0.25);
      color: var(--accent2);
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(200,169,110,0.3);
    }

    /* ===== NO RESULTS ===== */
    .no-results {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      display: none;
    }
    .no-results .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lb-img-wrap {
      position: relative;
      max-width: 90vw;
      max-height: 80vh;
    }
    .lb-img-wrap img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .lb-info {
      margin-top: 16px;
      text-align: center;
    }
    .lb-title { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .lb-tags { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .lb-tag {
      background: var(--tag-bg);
      color: var(--accent);
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    .lb-close {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .lb-close:hover { background: rgba(255,255,255,0.2); }
    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.2); }
    .lb-prev { right: 20px; }
    .lb-next { left: 20px; }
    /* block right-click on images */
    img { -webkit-user-drag: none; pointer-events: none; }
    .photo-item, .album-card { pointer-events: auto; }
    .lb-img-wrap img { pointer-events: none; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 60px;
    }
    footer strong { color: var(--accent); }

    /* hide albums when in photo view */
    .albums-section.hidden { display: none; }
    .back-btn {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-bottom: 24px;
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--accent); }
    .back-btn.visible { display: inline-flex; align-items: center; gap: 6px; }
  </style>
</head>
<body oncontextmenu="return false">

<header>
  <div class="logo">Helen<span>ny</span></div>
  <nav id="albumNav">
    <button class="active" onclick="showAll()">הכל</button>
  </nav>
</header>

<div class="hero">
  <h1>Helenny</h1>
  <p>Photography &nbsp;·&nbsp; Israel</p>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="חיפוש לפי תגית או שם..." oninput="filterPhotos()" />
  </div>
</div>

<div class="section">
  <!-- Albums overview -->
  <div class="albums-section" id="albumsSection">
    <div class="section-title">אלבומים</div>
    <div class="albums-grid" id="albumsGrid"></div>
  </div>

  <!-- Back button -->
  <button class="back-btn" id="backBtn" onclick="showAll()">← חזרה לכל האלבומים</button>

  <!-- Photos grid -->
  <div class="section-title" id="galleryTitle">כל התמונות</div>
  <div class="gallery" id="gallery"></div>
  <div class="no-results" id="noResults">
    <div class="icon">🔍</div>
    <p>לא נמצאו תמונות</p>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav lb-prev" onclick="lbNav(1)">&#8250;</button>
  <button class="lb-nav lb-next" onclick="lbNav(-1)">&#8249;</button>
  <div class="lb-img-wrap">
    <img id="lbImg" src="" alt="" />
  </div>
  <div class="lb-info">
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-tags" id="lbTags"></div>
  </div>
</div>

<footer>
  &copy; 2026 <strong>Helenny</strong> &nbsp;·&nbsp; כל הזכויות שמורות &nbsp;·&nbsp; אין להעתיק או להוריד תמונות ללא אישור
</footer>

<script>
  // ===== DATA =====
  // כדי להוסיף תמונות: הוסף אובייקט למערך PHOTOS
  // { src: 'photos/img.jpg', title: 'שם', album: 'שם אלבום', tags: ['תג1','תג2'] }
  const PHOTOS = [
    { src: 'photos/IMG_8302.JPG', title: 'KC-46A Illinois ANG', album: 'נתב"ג', tags: ['אמריקאי', 'מטוס תדלוק', 'נתב"ג'] },
    { src: 'photos/IMG_8246.jpg', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_8200.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_8170.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_5155.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_8307.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_5432.JPG', title: 'הרצליה', album: 'הרצליה', tags: ['הרצליה'] },
    { src: 'photos/IMG_9584.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_9608.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_9638.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_9672.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
    { src: 'photos/IMG_9707.JPG', title: 'נתב"ג', album: 'נתב"ג', tags: ['נתב"ג'] },
  ];

  const ALBUM_ICONS = {
    'מטוסים': '✈️',
    'טבע': '🌿',
    'עיר': '🌆',
    'שקיעות': '🌅',
    'לילה': '🌙',
    'default': '📷'
  };

  let currentAlbum = null;
  let lbIndex = 0;
  let visiblePhotos = [];

  // ===== INIT =====
  function init() {
    buildAlbums();
    buildNav();
    renderPhotos(PHOTOS);
  }

  function buildAlbums() {
    const albums = {};
    PHOTOS.forEach(p => {
      if (!albums[p.album]) albums[p.album] = [];
      albums[p.album].push(p);
    });

    const grid = document.getElementById('albumsGrid');
    grid.innerHTML = '';

    if (Object.keys(albums).length === 0) {
      grid.innerHTML = '<div style="color:var(--muted);font-size:0.9rem;padding:20px 0;">עדיין אין תמונות — הוסף תמונות לתיקיית photos/</div>';
      return;
    }

    Object.entries(albums).forEach(([name, photos]) => {
      const card = document.createElement('div');
      card.className = 'album-card';
      const icon = ALBUM_ICONS[name] || ALBUM_ICONS['default'];
      const thumb = photos[0]?.src;
      card.innerHTML = `
        <div class="album-thumb">
          ${thumb ? `<img src="${thumb}" alt="${name}" />` : icon}
        </div>
        <div class="album-info">
          <div class="album-name">${icon} ${name}</div>
          <div class="album-count">${photos.length} תמונות</div>
        </div>`;
      card.onclick = () => filterByAlbum(name);
      grid.appendChild(card);
    });
  }

  function buildNav() {
    const nav = document.getElementById('albumNav');
    const albums = [...new Set(PHOTOS.map(p => p.album))];
    const existing = nav.querySelectorAll('button');
    existing.forEach((b,i) => { if(i>0) b.remove(); });
    albums.forEach(album => {
      const btn = document.createElement('button');
      btn.textContent = (ALBUM_ICONS[album] || '📷') + ' ' + album;
      btn.onclick = () => filterByAlbum(album);
      nav.appendChild(btn);
    });
  }

  function renderPhotos(photos) {
    visiblePhotos = photos;
    const gallery = document.getElementById('gallery');
    const noResults = document.getElementById('noResults');
    gallery.innerHTML = '';

    if (photos.length === 0) {
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    photos.forEach((photo, i) => {
      const item = document.createElement('div');
      item.className = 'photo-item';
      const tagsHtml = (photo.tags || []).map(t => `<span class="photo-tag">${t}</span>`).join('');
      item.innerHTML = `
        <img src="${photo.src}" alt="${photo.title}" loading="lazy" />
        <div class="photo-overlay">
          <div class="photo-title">${photo.title}</div>
          <div class="photo-tags">${tagsHtml}</div>
        </div>`;
      item.onclick = () => openLightbox(i);
      gallery.appendChild(item);
    });
  }

  function filterByAlbum(album) {
    currentAlbum = album;
    const filtered = PHOTOS.filter(p => p.album === album);
    renderPhotos(filtered);
    document.getElementById('galleryTitle').textContent = (ALBUM_ICONS[album] || '📷') + ' ' + album;
    document.getElementById('albumsSection').classList.add('hidden');
    document.getElementById('backBtn').classList.add('visible');
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('#albumNav button').forEach(b => {
      b.classList.toggle('active', b.textContent.includes(album));
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showAll() {
    currentAlbum = null;
    renderPhotos(PHOTOS);
    document.getElementById('galleryTitle').textContent = 'כל התמונות';
    document.getElementById('albumsSection').classList.remove('hidden');
    document.getElementById('backBtn').classList.remove('visible');
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('#albumNav button').forEach((b,i) => {
      b.classList.toggle('active', i === 0);
    });
  }

  function filterPhotos() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const base = currentAlbum ? PHOTOS.filter(p => p.album === currentAlbum) : PHOTOS;
    if (!q) { renderPhotos(base); return; }
    const filtered = base.filter(p =>
      p.title.toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q)) ||
      p.album.toLowerCase().includes(q)
    );
    renderPhotos(filtered);
  }

  // ===== LIGHTBOX =====
  function openLightbox(index) {
    lbIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lbNav(dir) {
    lbIndex = (lbIndex + dir + visiblePhotos.length) % visiblePhotos.length;
    updateLightbox();
  }

  function updateLightbox() {
    const photo = visiblePhotos[lbIndex];
    document.getElementById('lbImg').src = photo.src;
    document.getElementById('lbTitle').textContent = photo.title;
    const tags = document.getElementById('lbTags');
    tags.innerHTML = (photo.tags || []).map(t => `<span class="lb-tag">${t}</span>`).join('');
  }

  // keyboard nav
  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') lbNav(-1);
    if (e.key === 'ArrowLeft') lbNav(1);
  });

  // disable save image
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());

  init();
</script>
</body>
</html>
